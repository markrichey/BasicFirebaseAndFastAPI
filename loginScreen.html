<!DOCTYPE html>
<html>
<body>
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" placeholder="password" type="password">
  <button onclick="login()">Login</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAC0Cl7ye8NnIVBhLRvEPpeJaaILEbZe1U",
      authDomain: "tenant-9dd57.firebaseapp.com",
      projectId: "tenant-9dd57",
      storageBucket: "tenant-9dd57.firebasestorage.app",
      messagingSenderId: "809524423775",
      appId: "1:809524423775:web:add80ddf5bb57071b2bfea",
      measurementId: "G-4T4LTDLMYL"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const token = await userCred.user.getIdToken();

      // Send token to backend
      const res = await fetch("http://localhost:5000/protected", {
        headers: { Authorization: `Bearer ${token}` }
      });

      console.log(await res.text());
    }
  </script>
</body>
</html>
